# Cloudflare Worker + Static Assets.
# - Static Assets serve the built SPA. `not_found_handling = single-page-application`
#   makes client routes (/build, /analyze, /resume) return index.html so React
#   Router can handle them (no redirects).
# - `run_worker_first = ["/api/*"]` runs worker/index.js ONLY for the API routes;
#   everything else is served directly from client/dist.
# Set ANTHROPIC_API_KEY as a Worker secret — never commit it.
name = "createcv"
main = "worker/index.js"
compatibility_date = "2024-11-01"

[assets]
directory = "./client/dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]
