# Cloudflare Worker + Static Assets.
# `main` is the Worker that handles /api/* and serves the built SPA via the
# ASSETS binding. Build the client first (npm run build) so ./client/dist exists.
# Set ANTHROPIC_API_KEY as a Worker secret — never commit it.
name = "createcv"
main = "worker/index.js"
compatibility_date = "2024-11-01"

[assets]
directory = "./client/dist"
binding = "ASSETS"
# The Worker handles SPA fallback itself so missing hashed assets 404 honestly.
not_found_handling = "none"
